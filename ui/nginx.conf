server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend running in the same cluster
    location /api/ {
        # The backend service is named 'ml-job-api-service' on port 80
        # Wait, the internal K8s service `ml-job-api-service` exposes port 80
        proxy_pass http://ml-job-api-service.default.svc.cluster.local:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
